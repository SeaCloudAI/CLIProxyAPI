apiVersion: apps/v1
kind: Deployment
metadata:
  name: cli-proxy-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cli-proxy-api
  template:
    metadata:
      labels:
        app: cli-proxy-api
    spec:
      containers:
        - name: cli-proxy-api
          image: __IMAGE__
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              value: "__APP_ENV__"
          ports:
            - containerPort: 8317
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8317
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8317
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /CLIProxyAPI/config.yaml
              subPath: config.yaml
            - name: auth
              mountPath: /var/lib/cli-proxy-api/auth
      volumes:
        - name: config
          configMap:
            name: cli-proxy-api-config
        - name: auth
          emptyDir: {}
