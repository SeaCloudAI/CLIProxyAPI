# Google Cloud Build configuration for CLIProxyAPI.
# Target project/cluster/region/namespace follows folkos-message.

steps:
  - name: "gcr.io/cloud-builders/git"
    id: "prepare-metadata"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        date +%s > /workspace/start_time

        TIMESTAMP=$$(TZ=Asia/Shanghai date '+%Y%m%d-%H%M%S')
        IMAGE_TAG="${SHORT_SHA}-$${TIMESTAMP}"
        echo "$${IMAGE_TAG}" > /workspace/image_tag

        COMMIT_MESSAGE=$$(git log -1 --format='%s' 2>/dev/null || echo "自动构建")
        COMMIT_AUTHOR=$$(git log -1 --format='%an' 2>/dev/null || echo "System")
        COMMIT_MESSAGE=$$(python3 -c "import sys; m=sys.argv[1]; print(m[:47]+'...' if len(m)>50 else m, end='')" "$$COMMIT_MESSAGE")
        echo "$${COMMIT_MESSAGE}" > /workspace/commit_message
        echo "$${COMMIT_AUTHOR}" > /workspace/commit_author

        if [ "${BRANCH_NAME}" = "release" ]; then
          echo "seaart-seacloud-prod" > /workspace/env_project
          echo "seacloud-production-us-central1" > /workspace/env_cluster
          echo "us-central1" > /workspace/env_region
          echo "base-installation-release" > /workspace/env_namespace
          echo "us-central1-docker.pkg.dev/seaart-seacloud-prod/seacloud-release" > /workspace/env_registry
          echo "seacloud-cli-proxy-api" > /workspace/env_image_name
          echo "prod" > /workspace/env_name
        else
          echo "seaart-seacloud-dev" > /workspace/env_project
          echo "seacloud-develop-us-central1" > /workspace/env_cluster
          echo "us-central1" > /workspace/env_region
          echo "base-installation-develop" > /workspace/env_namespace
          echo "us-central1-docker.pkg.dev/seaart-seacloud-dev/seacloud-develop" > /workspace/env_registry
          echo "seacloud-cli-proxy-api" > /workspace/env_image_name
          echo "develop" > /workspace/env_name
        fi

        echo "Commit: $${COMMIT_AUTHOR} / $${COMMIT_MESSAGE}"
        echo "Image Tag: $${IMAGE_TAG}"
        echo "Project: $$(cat /workspace/env_project)"
        echo "Cluster: $$(cat /workspace/env_cluster)"
        echo "Region: $$(cat /workspace/env_region)"
        echo "Namespace: $$(cat /workspace/env_namespace)"
        echo "Registry: $$(cat /workspace/env_registry)"

  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    entrypoint: "bash"
    env:
      - "DOCKER_BUILDKIT=1"
    args:
      - "-c"
      - |
        REGISTRY=$$(cat /workspace/env_registry)
        IMAGE_NAME=$$(cat /workspace/env_image_name)
        IMAGE_TAG=$$(cat /workspace/image_tag)

        docker build \
          -t $${REGISTRY}/$${IMAGE_NAME}:$${IMAGE_TAG} \
          -t $${REGISTRY}/$${IMAGE_NAME}:${SHORT_SHA} \
          -t $${REGISTRY}/$${IMAGE_NAME}:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --build-arg VERSION=${SHORT_SHA} \
          --build-arg COMMIT=${COMMIT_SHA} \
          --build-arg BUILD_DATE=$$(date -u +%Y-%m-%dT%H:%M:%SZ) \
          --cache-from $${REGISTRY}/$${IMAGE_NAME}:latest \
          -f Dockerfile \
          .
    timeout: 1800s
    waitFor: ["prepare-metadata"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        REGISTRY=$$(cat /workspace/env_registry)
        IMAGE_NAME=$$(cat /workspace/env_image_name)
        docker push --all-tags $${REGISTRY}/$${IMAGE_NAME}
    waitFor: ["build-image"]

  - name: "gcr.io/cloud-builders/kubectl"
    id: "deploy-to-gke"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        PROJECT=$$(cat /workspace/env_project)
        CLUSTER=$$(cat /workspace/env_cluster)
        REGION=$$(cat /workspace/env_region)
        NAMESPACE=$$(cat /workspace/env_namespace)
        REGISTRY=$$(cat /workspace/env_registry)
        IMAGE_NAME=$$(cat /workspace/env_image_name)
        IMAGE_TAG=$$(cat /workspace/image_tag)
        ENV_NAME=$$(cat /workspace/env_name)

        gcloud container clusters get-credentials $${CLUSTER} \
          --region=$${REGION} \
          --project=$${PROJECT}

        kubectl set image deployment/${_DEPLOYMENT_NAME} \
          ${_CONTAINER_NAME}=$${REGISTRY}/$${IMAGE_NAME}:$${IMAGE_TAG} \
          -n $${NAMESPACE}

        kubectl set env deployment/${_DEPLOYMENT_NAME} \
          APP_ENV=$${ENV_NAME} \
          -n $${NAMESPACE}

        PGSTORE_ENABLED_VALUE="${_PGSTORE_ENABLED}"
        PGSTORE_DSN_VALUE="${_PGSTORE_DSN}"
        PGSTORE_SCHEMA_VALUE="${_PGSTORE_SCHEMA}"
        PGSTORE_CONFIG_TABLE_VALUE="${_PGSTORE_CONFIG_TABLE}"
        PGSTORE_AUTH_TABLE_VALUE="${_PGSTORE_AUTH_TABLE}"
        PGSTORE_USAGE_TABLE_VALUE="${_PGSTORE_USAGE_TABLE}"
        PGSTORE_LOCAL_PATH_VALUE="${_PGSTORE_LOCAL_PATH}"

        if [ "$${ENV_NAME}" = "develop" ] && [ -z "$${PGSTORE_ENABLED_VALUE}" ]; then
          PGSTORE_ENABLED_VALUE="true"
        fi

        if [ "$${ENV_NAME}" = "develop" ] && [ "$${PGSTORE_ENABLED_VALUE}" = "true" ]; then
          if [ -z "$${PGSTORE_DSN_VALUE}" ]; then
            PGSTORE_DSN_VALUE="postgresql://postgres:D6%3FtX%7DE%3D%23%3C88se%2Bf@10.94.112.17:5432/postgres?sslmode=prefer"
          fi
          if [ -z "$${PGSTORE_SCHEMA_VALUE}" ]; then
            PGSTORE_SCHEMA_VALUE="cliproxy_cli_proxy_api_test"
          fi
          if [ -z "$${PGSTORE_CONFIG_TABLE_VALUE}" ]; then
            PGSTORE_CONFIG_TABLE_VALUE="cliproxy_config_test"
          fi
          if [ -z "$${PGSTORE_AUTH_TABLE_VALUE}" ]; then
            PGSTORE_AUTH_TABLE_VALUE="cliproxy_auth_test"
          fi
          if [ -z "$${PGSTORE_USAGE_TABLE_VALUE}" ]; then
            PGSTORE_USAGE_TABLE_VALUE="cliproxy_usage_test"
          fi
          if [ -z "$${PGSTORE_LOCAL_PATH_VALUE}" ]; then
            PGSTORE_LOCAL_PATH_VALUE="/var/lib/cliproxy/develop"
          fi
        fi

        if [ "$${PGSTORE_ENABLED_VALUE}" = "true" ]; then
          if [ -z "$${PGSTORE_DSN_VALUE}" ]; then
            echo "PG store is enabled but _PGSTORE_DSN is empty"
            exit 1
          fi

          if [ -z "$${PGSTORE_SCHEMA_VALUE}" ]; then
            PGSTORE_SCHEMA_VALUE="cliproxy_$${ENV_NAME}"
          fi

          if [ -z "$${PGSTORE_CONFIG_TABLE_VALUE}" ]; then
            PGSTORE_CONFIG_TABLE_VALUE="cliproxy_config_$${ENV_NAME}"
          fi

          if [ -z "$${PGSTORE_AUTH_TABLE_VALUE}" ]; then
            PGSTORE_AUTH_TABLE_VALUE="cliproxy_auth_$${ENV_NAME}"
          fi

          if [ -z "$${PGSTORE_USAGE_TABLE_VALUE}" ]; then
            PGSTORE_USAGE_TABLE_VALUE="cliproxy_usage_$${ENV_NAME}"
          fi

          if [ -z "$${PGSTORE_LOCAL_PATH_VALUE}" ]; then
            PGSTORE_LOCAL_PATH_VALUE="/var/lib/cliproxy/$${ENV_NAME}"
          fi

          echo "Enabling Postgres-backed store"
          echo "  schema: $${PGSTORE_SCHEMA_VALUE}"
          echo "  config table: $${PGSTORE_CONFIG_TABLE_VALUE}"
          echo "  auth table: $${PGSTORE_AUTH_TABLE_VALUE}"
          echo "  usage table: $${PGSTORE_USAGE_TABLE_VALUE}"
          echo "  local path: $${PGSTORE_LOCAL_PATH_VALUE}"

          kubectl set env deployment/${_DEPLOYMENT_NAME} \
            PGSTORE_DSN="$${PGSTORE_DSN_VALUE}" \
            PGSTORE_SCHEMA="$${PGSTORE_SCHEMA_VALUE}" \
            PGSTORE_CONFIG_TABLE="$${PGSTORE_CONFIG_TABLE_VALUE}" \
            PGSTORE_AUTH_TABLE="$${PGSTORE_AUTH_TABLE_VALUE}" \
            PGSTORE_USAGE_TABLE="$${PGSTORE_USAGE_TABLE_VALUE}" \
            PGSTORE_LOCAL_PATH="$${PGSTORE_LOCAL_PATH_VALUE}" \
            -n $${NAMESPACE}
        else
          echo "PG store injection disabled; leaving existing PGSTORE_* env unchanged"
        fi

        if ! kubectl rollout status deployment/${_DEPLOYMENT_NAME} \
          -n $${NAMESPACE} \
          --timeout=600s; then
          echo "=== deployment ==="
          kubectl describe deployment/${_DEPLOYMENT_NAME} -n $${NAMESPACE} || true

          echo "=== replicasets ==="
          kubectl get rs -n $${NAMESPACE} | grep ${_DEPLOYMENT_NAME} || true

          echo "=== pods ==="
          kubectl get pods -n $${NAMESPACE} -o wide | grep ${_DEPLOYMENT_NAME} || true

          echo "=== pod describe ==="
          POD_NAME=$$(kubectl get pods -n $${NAMESPACE} -o name | grep ${_DEPLOYMENT_NAME} | head -n 1 | cut -d/ -f2)
          if [ -n "$${POD_NAME}" ]; then
            kubectl describe pod "$${POD_NAME}" -n $${NAMESPACE} || true
            echo "=== pod logs ==="
            kubectl logs "$${POD_NAME}" -n $${NAMESPACE} --tail=200 || true
            echo "=== previous logs ==="
            kubectl logs "$${POD_NAME}" -n $${NAMESPACE} --tail=200 --previous || true
          fi
          exit 1
        fi
    waitFor: ["push-image"]

substitutions:
  _DEPLOYMENT_NAME: "seacloud-cli-proxy-api"
  _CONTAINER_NAME: "seacloud-cli-proxy-api"
  _PGSTORE_ENABLED: ""
  _PGSTORE_DSN: ""
  _PGSTORE_SCHEMA: ""
  _PGSTORE_CONFIG_TABLE: ""
  _PGSTORE_AUTH_TABLE: ""
  _PGSTORE_USAGE_TABLE: ""
  _PGSTORE_LOCAL_PATH: ""

options:
  machineType: "E2_HIGHCPU_32"
  diskSizeGb: 200
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: "ALLOW_LOOSE"
  env:
    - DOCKER_BUILDKIT=1

timeout: "2400s"

tags:
  - "seacloud-cli-proxy-api"
  - "automated-build"
